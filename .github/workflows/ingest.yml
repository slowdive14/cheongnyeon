# 정책 자동 수집 배치 (Phase A) — 온통청년 전량 증분 인제스트 → Supabase.
#
# 주기: 주 2회, 월·목 새벽 04:00 KST (= 일·수 19:00 UTC). 수동 실행(workflow_dispatch) 가능.
# 증분: contentHash 기반 — 변경분만 Gemini(파싱·설명·임베딩) 호출. 평시 비용 몇 원 수준.
# 실패 알림: Actions 기본 실패 메일(저장소 소유자). 로그 요약은 Step Summary에 기록.
#
# 필요 Secrets (Settings → Secrets and variables → Actions):
#   ONTONG_API_KEY / GEMINI_API_KEY / SUPABASE_URL / SUPABASE_SERVICE_KEY
name: ingest-policies

on:
  schedule:
    - cron: '0 19 * * 0,3' # 일·수 19:00 UTC = 월·목 04:00 KST
  workflow_dispatch:
    inputs:
      force_explain:
        description: '혜택 한 줄(D-②) 전체 재생성 — 프롬프트 목적 변경 시 1회성(~$1). 평소 false.'
        type: boolean
        default: false

# 동시 실행 방지(중복 적재 금지). 진행 중이면 새 실행은 대기·중복 취소 없이 직렬화.
concurrency:
  group: ingest-policies
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 90 # 전량 재처리(최악) ~44분 + 여유. 증분 평시는 수 분.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ingest (incremental)
        env:
          ONTONG_API_KEY: ${{ secrets.ONTONG_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          INGEST_CONCURRENCY: '12'
          # 서울 청년몽땅 합류(Phase B) — ⛔ 일시 비활성(운영자 결정 2026-07-13).
          #   사유: 청년몽땅 이용약관(제12조③·제13조 — 배포·제3자 제공·가공 시 서울시 명시적 승인 필요)
          #        상 라이선스 승인 미취득. 공개 제출/서비스 전까지 서울분 제외.
          #   조치: (1) 수집 중단(아래 SEOUL_INGEST=''), (2) 기존 서울 데이터 310건 DB purge 완료(2026-07-13).
          #        → 서비스는 온통청년 전량(2,651건)만 노출.
          #   ♻️ 재개방(서울시 승인 후): 아래 값을 'on'으로 바꾸고 workflow_dispatch로 1회 수동 실행하면
          #        seoulClient가 다시 크롤·적재. 코드(seoulClient·정규화)는 그대로 보존되어 있어 즉시 복구 가능.
          #   근거: _workspace/40_B0_recon.md §4.
          SEOUL_INGEST: '' # ''=off(비활성) · 'on'=재개방. 승인 취득 전까지 off 유지.
          # 혜택 한 줄(D-②) 전체 재생성 — 수동 실행에서 force_explain=true일 때만 'on'. 정기(cron)은 항상 off.
          INGEST_FORCE_EXPLAIN: ${{ inputs.force_explain && 'on' || '' }}
        run: |
          set -o pipefail
          npm run ingest 2>&1 | tee ingest.log

      - name: Write run summary
        if: always()
        run: |
          {
            echo "## 인제스트 실행 요약"
            echo '```'
            tail -n 40 ingest.log 2>/dev/null || echo "(로그 없음)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
